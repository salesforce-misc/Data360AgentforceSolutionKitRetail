<template>
   
    <template if:true={headerMessage}>
        <div class="slds-text-body_regular slds-m-bottom_small">
            {headerMessage}
        </div>
    </template>

    <div class="carousel-box">
        <div class="carousel" lwc:ref="carouselTrack">
            <template for:each={products} for:item="product">
                <div key={product.key} class="card">

                    <a href={product.imageRedirectUrl} target="_blank" rel="noopener noreferrer">
                        <img src={product.imageUrl} alt={product.name} />
                    </a>

                    <a href={product.url} class="product-name" target="_blank" rel="noopener noreferrer">
                        {product.name}
                    </a>

                    <div class="desc">
                        {product.description}
                    </div>

                    
                    <template if:true={product.promoMessage}>
                        <div class="promo slds-m-top_small">
                            <span class="offer-label">Discount:</span>
                            <span class="offer-text">{product.promoMessage}</span>
                        </div>
                    </template>

                </div>
            </template>
        </div>
    </div>
</template>
